<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="row w-100">
    <div class="col text-center">
      <div>
        <h1 class="font-weight-bold gf-text-wrap-balance intro" i18n>
          RESEARCH PORTFOLIO
        </h1>
      </div>
      <p class="gf-text-wrap-balance lead mb-5" style="color: #a1a1aa; font-size: 1.25rem;" i18n>
        Private Intelligence & Wealth Mapping Dashboard.
      </p>

      <div class="button-container mb-5 mt-4 d-flex justify-content-center align-items-center flex-wrap"
        style="gap: 1.5rem;">
        <a class="btn-gradient" mat-flat-button [routerLink]="['/auth']"
          style="padding: 24px 36px; border-radius: 50px; font-weight: 600; font-size: 1.1rem; min-width: 180px; border: none; color: white;"
          i18n>Sign in</a>
        <a mat-stroked-button [routerLink]="routerLinkDemo"
          style="padding: 24px 36px; border-radius: 50px; border-color: rgba(255,255,255,0.15); font-size: 1.1rem; min-width: 180px;"
          i18n>Features</a>
      </div>
    </div>
  </div>
</div>
